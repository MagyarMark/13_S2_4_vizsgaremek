tags:
  - name: Admin
    description: Admin jogosultsághoz kötött műveletek

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Hibás adatok
        error:
          type: string
          example: Hibaüzenet
        errors:
          type: array
          items:
            type: object
    AdminUserItem:
      type: object
      properties:
        id:
          type: integer
          example: 7
        felhasznalonev:
          type: string
          example: diak1
        email:
          type: string
          example: diak1@gmail.com
        teljes_nev:
          type: string
          example: Kovács József
        szerep_tipus:
          type: string
          enum: [tanar, diak, admin]
          example: diak
        aktiv:
          type: boolean
          example: true
        elerheto:
          type: boolean
          example: true
        letrehozas_idopont:
          type: string
          format: date-time
          example: 2026-02-12T10:00:00
        utolso_bejelentkezes:
          type: string
          format: date-time
          nullable: true
          example: 2026-03-01T08:15:00
    AdminUserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: ujemail@example.com
        teljes_nev:
          type: string
          example: Frissített Név
        jelszo:
          type: string
          minLength: 6
          example: ujTitkos123
        szerep_tipus:
          type: string
          enum: [tanar, diak, admin]
          example: tanar
        aktiv:
          type: boolean
          example: true
        elerheto:
          type: boolean
          example: false
    AdminRoleUpdateRequest:
      type: object
      required:
        - szerep_tipus
      properties:
        szerep_tipus:
          type: string
          enum: [tanar, diak, admin]
          example: admin
    AdminProjectItem:
      type: object
      properties:
        id:
          type: integer
          example: 2
        projekt_nev:
          type: string
          example: Szoftver projekt
        leiras:
          type: string
          nullable: true
          example: Fejlesztés és tesztelés
        letrehozo_id:
          type: integer
          example: 7
        statusz:
          type: string
          example: aktiv
        hatarido:
          type: string
          format: date-time
          nullable: true
          example: 2026-03-30T00:00:00
        letrehozas_idopont:
          type: string
          format: date-time
          example: 2026-02-12T10:00:00
        creator_username:
          type: string
          nullable: true
          example: tanar1
        creator_name:
          type: string
          nullable: true
          example: Nagy Éva
    AdminSubmissionItem:
      type: object
      properties:
        id:
          type: integer
          example: 15
        feladat_id:
          type: integer
          example: 10
        felhasznalo_id:
          type: integer
          example: 7
        tanar_id:
          type: integer
          example: 2
        pontszam:
          type: number
          example: 87.5
        jegy:
          type: integer
          example: 4
        statusz:
          type: string
          example: ertekelt
        visszajelzes:
          type: string
          nullable: true
          example: Jó munka
        bekuldes_idopont:
          type: string
          format: date-time
          example: 2026-02-08T14:22:00
        ertekeles_idopont:
          type: string
          format: date-time
          nullable: true
          example: 2026-02-09T09:00:00
        student_username:
          type: string
          nullable: true
          example: diak1
        student_name:
          type: string
          nullable: true
          example: Kovács József
        teacher_username:
          type: string
          nullable: true
          example: tanar1
        teacher_name:
          type: string
          nullable: true
          example: Nagy Éva
        task_name:
          type: string
          nullable: true
          example: Első számonkérés

paths:
  /api/admin/users:
    get:
      summary: Felhasználók listázása admin jogosultsággal
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
          description: Oldalszám
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Oldalmeret
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [tanar, diak, admin]
          description: Szerepkör szerinti szűrés
        - in: query
          name: active
          required: false
          schema:
            type: boolean
          description: Aktív állapot szerinti szűrés
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Keresés felhasználónév, email vagy teljes név alapján
      responses:
        '200':
          description: Felhasználó lista paginációval
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdminUserItem'
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 50
                          total:
                            type: integer
                            example: 126
                          totalPages:
                            type: integer
                            example: 3
        '400':
          description: Hibás kérés paraméterek
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/user/{id}:
    get:
      summary: Egy felhasználó részletes adatainak lekérése
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Felhasználó azonosító
      responses:
        '200':
          description: Felhasználó adatok és statisztikák
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AdminUserItem'
                      stats:
                        type: object
                        properties:
                          projectsCreated:
                            type: integer
                            example: 4
                          submissions:
                            type: integer
                            example: 12
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/userUpdate/{id}:
    put:
      summary: Felhasználó adatainak frissítése
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Felhasználó azonosító
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      responses:
        '200':
          description: Sikeres frissítés
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Felhasználó sikeresen frissítve
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AdminUserItem'
        '400':
          description: Hibás adatok vagy email már használatban
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/userDelete/{id}:
    delete:
      summary: Felhasználó törlése
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Törlendő felhasználó azonosító
      responses:
        '200':
          description: Felhasználó sikeresen törölve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Felhasználó sikeresen törölve
                  data:
                    type: object
                    properties:
                      deleted_id:
                        type: integer
                        example: 7
                      deleted_username:
                        type: string
                        example: diak1
        '400':
          description: Saját fiók nem törölhető
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/user/{id}/role:
    put:
      summary: Felhasználó szerepkörének módosítása
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Felhasználó azonosító
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminRoleUpdateRequest'
      responses:
        '200':
          description: Sikeres szerepkör módosítás
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Felhasználó szerepe sikeresen módosítva
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 7
                          felhasznalonev:
                            type: string
                            example: diak1
                          szerep_tipus:
                            type: string
                            enum: [tanar, diak, admin]
                            example: admin
        '400':
          description: Hibás adatok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/projects:
    get:
      summary: Projektek listázása admin jogosultsággal
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
          description: Oldalszám
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Oldalmeret
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Projekt státusz szerinti szűrés
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Keresés projekt név vagy leírás alapján
      responses:
        '200':
          description: Projekt lista paginációval
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      projects:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdminProjectItem'
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 50
                          total:
                            type: integer
                            example: 28
                          totalPages:
                            type: integer
                            example: 1
        '400':
          description: Hibás kérés paraméterek
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/projectDelete/{id}:
    delete:
      summary: Projekt törlése
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Törlendő projekt azonosító
      responses:
        '200':
          description: Projekt sikeresen törölve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Projekt sikeresen törölve
                  data:
                    type: object
                    properties:
                      deleted_id:
                        type: integer
                        example: 2
                      deleted_name:
                        type: string
                        example: Szoftver projekt
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Projekt nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/submissions:
    get:
      summary: Beadások listázása admin jogosultsággal
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
          description: Oldalszám
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Oldalmeret
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Beadás státusz szerinti szűrés
        - in: query
          name: student_id
          required: false
          schema:
            type: integer
          description: Diák azonosító szerinti szűrés
        - in: query
          name: teacher_id
          required: false
          schema:
            type: integer
          description: Tanár azonosító szerinti szűrés
        - in: query
          name: task_id
          required: false
          schema:
            type: integer
          description: Feladat azonosító szerinti szűrés
      responses:
        '200':
          description: Beadás lista paginációval
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      submissions:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdminSubmissionItem'
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          limit:
                            type: integer
                            example: 50
                          total:
                            type: integer
                            example: 42
                          totalPages:
                            type: integer
                            example: 1
        '400':
          description: Hibás kérés paraméterek
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/stats/overview:
    get:
      summary: Átfogó admin statisztikák
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Összesített rendszer statisztikák
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      users:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 230
                          active:
                            type: integer
                            example: 211
                          byRole:
                            type: array
                            items:
                              type: object
                              properties:
                                szerep_tipus:
                                  type: string
                                  example: diak
                                count:
                                  type: string
                                  example: '180'
                      projects:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 45
                          byStatus:
                            type: array
                            items:
                              type: object
                              properties:
                                statusz:
                                  type: string
                                  example: aktiv
                                count:
                                  type: string
                                  example: '30'
                      submissions:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 500
                          byStatus:
                            type: array
                            items:
                              type: object
                              properties:
                                statusz:
                                  type: string
                                  example: ertekelt
                                count:
                                  type: string
                                  example: '320'
                      messages:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 1200
                      files:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 890
                      recentActivity:
                        type: object
                        properties:
                          newUsers:
                            type: integer
                            example: 14
                          newProjects:
                            type: integer
                            example: 6
                          newSubmissions:
                            type: integer
                            example: 29
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nincs admin jogosultság
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

