tags:
  - name: Auth
    description: Felhasználói hitelesítés és profil kezelése

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token az Authorization headerben (Bearer <token>).
    refreshTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Refresh token az Authorization headerben (Bearer <refresh_token>).
  schemas:
    RegisterRequest:
      type: object
      required:
        - felhasznalonev
        - jelszo
        - email
        - szerep_tipus
      properties:
        felhasznalonev:
          type: string
          description: A felhasználó egyedi felhasználóneve
          example: ujfelhasznalo
        jelszo:
          type: string
          description: A felhasználó jelszava
          example: jelszo123
        email:
          type: string
          description: A felhasználó email címe
          example: user@example.com
        teljes_nev:
          type: string
          description: A felhasználó teljes neve
          example: Kiss Peter
        szerep_tipus:
          type: string
          description: A felhasználó szerepe a rendszerben (tanar, diak, admin)
          example: diak
          enum: [tanar, diak, admin]
    LoginRequest:
      type: object
      required:
        - felhasznalonev
        - jelszo
      properties:
        felhasznalonev:
          type: string
          example: ujfelhasznalo
        jelszo:
          type: string
          example: jelszo123
    UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
          description: Uj email cim
          example: updated@example.com
        teljes_nev:
          type: string
          description: Uj teljes nev
          example: Kiss Peter
        jelszo:
          type: string
          description: Uj jelszo
          example: ujjelszo123
        elerheto:
          type: boolean
          description: Felhasználó elérhetősége
          example: true
    ReactivateAccountRequest:
      type: object
      required:
        - token
        - email
        - jelszo
      properties:
        token:
          type: string
          description: A reaktivacios emailben kapott token
          example: a3e4f9d9a6089e8f495e39180f9ab8f4
        email:
          type: string
          description: Uj email cim a fiokhoz
          example: uj.email@example.com
        jelszo:
          type: string
          description: Uj jelszo a fiokhoz
          example: UjJelszo123
        teljes_nev:
          type: string
          description: Opcionális uj teljes nev
          example: Kiss Peter
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        felhasznalonev:
          type: string
          example: ujfelhasznalo
        email:
          type: string
          example: user@example.com
        teljes_nev:
          type: string
          example: Gipsz Jakab
        szerep_tipus:
          type: string
          example: diak
        aktiv:
          type: boolean
          example: true
        email_megerositve:
          type: boolean
          example: false
        elerheto:
          type: boolean
          example: true
        letrehozas_idopont:
          type: string
          format: date-time
          example: 2026-02-09T12:34:56
    Tokens:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Hibás adatok
        errors:
          type: array
          items:
            type: object

paths:
  /api/auth/register:
    post:
      summary: Új felhasználó regisztrációja
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Sikeres regisztráció
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sikeres regisztráció. Ellenorizd az emailedet a fiok aktivalasahoz.
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Hibás adatok vagy már foglalt felhasználónév/email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Bejelentkezés
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Sikeres bejelentkezés
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sikeres bejelentkezés
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        '400':
          description: Hibás adatok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Hibás felhasználónév vagy jelszó, vagy inaktív fiók
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email cím még nincs megerősítve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/verify-email:
    get:
      summary: Email cím megerősítése token alapján
      tags: [Auth]
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: A megerősítő emailben található token
      responses:
        '200':
          description: Email cím sikeresen megerősítve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Email cim sikeresen megerositve
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Hiányzó, érvénytelen vagy lejárt token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/resend-verification-email:
    post:
      summary: Megerősítő email újraküldése
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: Megerősítő email elküldve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Megerosito email ujra elkuldve
        '400':
          description: Hibás adatok vagy már megerősített email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      summary: Kijelentkezés
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sikeres kijelentkezés
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sikeres kijelentkezés
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Érvénytelen token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/profileData:
    get:
      summary: Felhasználói profil lekérése
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Felhasználói adatok
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Érvénytelen token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/profile:
    put:
      summary: Profil frissítése
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profil sikeresen frissítve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Profil sikeresen frissítve
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Hibás adatok vagy email már foglalt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Érvénytelen token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh-token:
    post:
      summary: Token frissítése
      tags: [Auth]
      security:
        - refreshTokenAuth: []
      responses:
        '200':
          description: Token sikeresen frissítve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Token sikeresen frissítve
                  data:
                    $ref: '#/components/schemas/Tokens'
        '401':
          description: Refresh token szükséges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Érvénytelen vagy lejárt refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/profileDelete:
    put:
      summary: Profil deaktiválása, adatok törlése és reaktivációs email küldése
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil sikeresen deaktiválva és email kiküldve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Felhasználói fiók sikeresen deaktiválva. Reaktivációs email elküldve.
        '400':
          description: Fiók már inaktív, vagy nincs email cím a reaktiváláshoz
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token szükséges vagy lejárt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Érvénytelen token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Felhasználó nem található
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/reactivate-account:
    post:
      summary: Fiók újraaktiválása tokennel és új belépési adatokkal
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactivateAccountRequest'
      responses:
        '200':
          description: Fiók sikeresen újraaktiválva és új adatok elmentve
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: A fiok sikeresen ujraaktiválva
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Hibás adatok, foglalt email vagy lejárt token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Szerver hiba
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
