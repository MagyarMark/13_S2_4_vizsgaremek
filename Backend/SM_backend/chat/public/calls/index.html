<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SM Hívás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-3">
        <div class="card p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label for="token-input" class="form-label">JWT Access Token</label>
                    <input id="token-input" class="form-control" placeholder="Másold be az accesToken-t az /api/auth/login végpontból" />
                </div>
                <div class="col-md-3">
                    <label for="room-input" class="form-label">Szoba</label>
                    <input id="room-input" class="form-control" value="general" />
                </div>
                <div class="col-md-3">
                    <button id="connect" class="btn btn-dark w-100">Csatlakozás</button>
                </div>
            </div>
            <small id="connection-status" class="text-muted mt-2">Nincs csatlakozva</small>
        </div>

        <div class="row g-2 align-items-center mb-3">
            <div class="col-md-auto fw-semibold" id="user-name"></div>
            <div class="col-md-auto">
                <input type="image" id="call" src="./call.png" alt="Hívás" width="50" height="50"/>
                <intput type="image" id="hangup" src="./callend.png" alt="Hívás befejezése" width="50" height="50"/>
            </div>
            <div class="col" id="answer"></div>
        </div>

        <div id="videos">
            <div id="video-wrapper" class="card p-2">
                <div id="waiting" class="alert alert-warning py-1 px-2">Várakozás válaszra...</div>
                <video class="video-player" id="local-video" autoplay playsinline muted></video>
                <small class="text-muted mt-2">Helyi</small>
            </div>
            <div class="card p-2">
                <video class="video-player" id="remote-video" autoplay playsinline></video>
                <small class="text-muted mt-2">Távoli</small>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="scripts.js"></script>
    <script src="socketListeners.js"></script>
</body>
</html>
